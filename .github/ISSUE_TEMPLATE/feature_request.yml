name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is currently hard or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should DevLogBus do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - devlogbusd daemon
        - Browser UI
        - TUI
        - CLI
        - Go SDK
        - Browser Tap extension
        - Journal bridge
        - Release/package
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or alternate design worth knowing?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, sketches, or related tools are welcome.
