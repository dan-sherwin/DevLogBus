name: Documentation
description: Report missing, confusing, or outdated documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or topic
      placeholder: docs/quickstart.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is missing or confusing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: Optional, but helpful.
