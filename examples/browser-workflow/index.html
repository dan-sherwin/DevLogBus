<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevLogBus Browser Workflow Example</title>
    <style>
      body {
        color: #17202a;
        font: 16px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 2rem auto;
        max-width: 760px;
      }

      button {
        background: #145ea8;
        border: 0;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        font: inherit;
        margin: 0 0.5rem 0.5rem 0;
        padding: 0.65rem 0.9rem;
      }

      code {
        background: #eef2f7;
        border-radius: 4px;
        padding: 0.1rem 0.25rem;
      }
    </style>
  </head>
  <body>
    <h1>DevLogBus Browser Workflow Example</h1>
    <p>
      Start <code>devlogbusd run</code>, open the DevLogBus UI, attach Browser
      Tap to this tab, then click the buttons below.
    </p>

    <button id="console">Console event</button>
    <button id="runtime">Runtime exception</button>
    <button id="network">Network event</button>
    <button id="direct">Direct HTTP publish</button>

    <script>
      const endpoint = "http://127.0.0.1:7423";

      document.querySelector("#console").addEventListener("click", () => {
        console.warn("Browser workflow warning", {
          cartId: "demo-cart",
          source: "example-page",
        });
      });

      document.querySelector("#runtime").addEventListener("click", () => {
        setTimeout(() => {
          throw new Error("Browser workflow demo exception");
        }, 0);
      });

      document.querySelector("#network").addEventListener("click", async () => {
        try {
          await fetch(`${endpoint}/api/about?demo=browser-workflow`);
        } catch (error) {
          console.error("Network demo failed", error);
        }
      });

      document.querySelector("#direct").addEventListener("click", async () => {
        await fetch(`${endpoint}/api/records`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            time: new Date().toISOString(),
            level: "INFO",
            source: "example_browser_page",
            message: "direct HTTP record from browser workflow example",
            attrs: {
              sourceGroup: "chrome:browser-workflow",
              action: "direct-publish",
            },
          }),
        });
      });
    </script>
  </body>
</html>
